<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfobello Beta</title>
    <link rel="stylesheet" href="sign-up.css">
</head>
<body>
<div class="buttons">

    <p>I'll only send you a mail once Portfobello is done!<br>In the meantime I'm curious to hear a bit about you.</p>
  <form method="post" action="https://send.lucaszuidema.com/form/submit?formId=2">
      
      <p>What's your email?*</p>
  <input type="email"
         name="mauticform[email]"
         class="input-close"
         placeholder="example@gmail.com"
         required>

         <p>What kind of Art do you make?*</p>
<input type="text"
name="mauticform[what_kind_of_art_do_you_m]"
class="input-close"
placeholder="e.g. paintings, graphic design, sculptures, sound art">
<br>

<input type="hidden" name="mauticform[beta]" value="no">
<input type="hidden" name="mauticform[formId]" value="2">
<input type="hidden" name="mauticform[formName]" value="signupportfobellobeta">

<br>
  <button type="submit" class="button-close">sign up</button>
</div>
</form>
</body>
</html>
